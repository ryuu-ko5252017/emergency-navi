<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地下街オフライン・ナビ</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; color: white; }
        #video { width: 100%; height: 100vh; object-fit: cover; opacity: 0.5; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #compass { position: absolute; top: 50%; left: 50%; width: 200px; height: 200px; 
                   margin: -100px; transition: transform 0.1s ease-out; }
        #info { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; }
        .target-arrow { width: 0; height: 0; border-left: 20px solid transparent; 
                        border-right: 20px solid transparent; border-bottom: 40px solid #00ff00; margin: 0 auto; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="overlay">
        <div id="compass">
            <div class="target-arrow"></div>
            <p style="text-align:center;">目的地</p>
        </div>
    </div>

    <div id="info">
        <div>現在地: <span id="pos">未確定 (QRをスキャンしてください)</span></div>
        <div>目的地までの距離: <span id="dist">-</span>m</div>
        <div>方位精度: <span id="acc">-</span></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
