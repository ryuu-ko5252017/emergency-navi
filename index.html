<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地下街オフライン・ナビ</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; color: white; }
        /* ビデオは最初は非表示。カメラ起動時に全画面で半透明表示されるよう調整 */
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; object-fit: cover; opacity: 0.5; z-index: 1; }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        #compass { position: absolute; top: 50%; left: 50%; width: 200px; height: 200px; 
                   margin: -100px; transition: transform 0.1s ease-out; }
        
        /* 操作パネルを最前面(z-index: 3)に配置 */
        #controls { position: absolute; top: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.8); 
                    padding: 10px; border-radius: 8px; max-height: 40vh; overflow-y: auto; z-index: 3; pointer-events: auto; }
        
        #info { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); 
                padding: 10px; border-radius: 8px; z-index: 2; }
        
        .target-arrow { width: 0; height: 0; border-left: 20px solid transparent; 
                        border-right: 20px solid transparent; border-bottom: 40px solid #00ff00; margin: 0 auto; }
        
        button { cursor: pointer; }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="overlay">
        <div id="compass">
            <div class="target-arrow"></div>
            <p style="text-align:center;">目的地</p>
        </div>
    </div>

    <div id="controls">
        <button onclick="toggleCamera()" id="camBtn" style="width: 100%; padding: 12px; margin-bottom: 10px; font-weight: bold;">
            📷 カメラ起動 (QRスキャン)
        </button>
        
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button onclick="importFromClipboard()" style="flex: 1; padding: 8px; font-size: 0.8em;">Gマップ座標取込</button>
            <button onclick="clearList()" style="flex: 1; padding: 8px; font-size: 0.8em; color: #ff6666; border: 1px solid #ff6666; background: none;">リスト消去</button>
        </div>

        <div id="point-list">
            </div>
    </div>

    <div id="info">
        <div>現在地: <span id="pos">未確定 (QRをスキャン)</span></div>
        <div>目的地: <span id="target-name">未設定</span></div>
        <div>距離: <span id="dist">-</span>m / 精度: <span id="acc">-</span></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
